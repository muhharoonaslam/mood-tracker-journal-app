name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Deploy .NET API to Railway
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service api --environment production --detach
        working-directory: ./mood-tracker-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 2: Build React app & deploy to GitHub Pages
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mood-tracker-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./mood-tracker-frontend

      - name: Build
        run: npm run build
        working-directory: ./mood-tracker-frontend
        env:
          # Full URL of the Railway backend, e.g. https://my-api.up.railway.app
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Sets the asset base path for GitHub Pages subdirectory hosting
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # GitHub Pages serves 404.html for unknown paths — copying index.html
      # here lets React Router handle client-side navigation on direct URL access.
      - name: Copy index.html → 404.html for SPA routing
        run: cp mood-tracker-frontend/dist/index.html mood-tracker-frontend/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./mood-tracker-frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
